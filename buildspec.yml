version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 967696262685.dkr.ecr.sa-east-1.amazonaws.com
      - REPO_URL="967696262685.dkr.ecr.sa-east-1.amazonaws.com/variacode"
  build:
    commands:
      - terraform init
      - terraform workspace select $TF_WORKSPACE || terraform workspace new $TF_WORKSPACE
      - |
        # Use the pipe '|' to allow multi-line shell scripting
        echo "Checking Infrastructure..."
        set +e # Allow the next command to fail without stopping the build
        terraform plan -detailed-exitcode -out=tfplan
        EXIT_CODE=$?
        set -e # Re-enable exit on error
        
        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "Infrastructure changes detected. Applying..."
          terraform apply -auto-approve tfplan
        elif [ "$EXIT_CODE" -eq 0 ]; then
          echo "Infrastructure is up to date. Checking application code..."
          if git diff --name-only HEAD^ HEAD | grep -E "index.html|Dockerfile"; then
             echo "App changes detected. Building image..."
             docker build --platform linux/amd64 -t webpage .
             docker tag webpage:latest $REPO_URL:latest
             docker push $REPO_URL:latest
             terraform apply -target=module.ecs -auto-approve
          else
             echo "No changes found. Skipping build."
          fi
        else
          echo "Terraform plan failed with exit code $EXIT_CODE"
          exit 1
        fi